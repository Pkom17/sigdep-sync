name: release

# Runs on a version tag (v1.0.0, v1.1.0, …). Builds the fat jar, the
# Docker image and pushes both to GHCR.
#
# Image target is read from the repository variable IMAGE_REGISTRY
# (Repository → Settings → Variables → Actions). Defaults to
# ghcr.io/<owner-of-the-repo> so a fresh fork pushes to its own owner
# without any setup. Set IMAGE_REGISTRY=ghcr.io/itech-ci in the
# upstream repo when you flip the official location.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    env:
      # Default registry is the same owner as the repo (Pkom17 on the
      # fork, ITECH-CI on upstream). Override via repo variable.
      IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || format('ghcr.io/{0}', github.repository_owner) }}
      IMAGE_NAME: sigdep-sync

    steps:
      - name: Resolve tag
        id: tag
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          # Strip leading 'refs/tags/' if present and the leading 'v'
          ref="${ref#refs/tags/}"
          echo "tag=$ref" >> $GITHUB_OUTPUT
          echo "version=${ref#v}" >> $GITHUB_OUTPUT

      - name: Checkout sigdep-sync
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      # Try the same tag first on sigdep-contracts ; fall back to master
      # if the tag doesn't exist there (rare — they're usually released
      # together). actions/checkout refuses paths outside the workspace
      # so we put the sibling inside the workspace and reference it as
      # ./.sigdep-contracts.
      - name: Checkout sigdep-contracts (matching tag)
        id: ck-contracts-tag
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sigdep-contracts
          ref: ${{ steps.tag.outputs.tag }}
          path: .sigdep-contracts
        continue-on-error: true

      - name: Fallback to contracts master if tag missing
        if: steps.ck-contracts-tag.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sigdep-contracts
          ref: master
          path: .sigdep-contracts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install sigdep-contracts to local M2
        working-directory: .sigdep-contracts
        run: mvn -B -DskipTests install

      - name: Build sigdep-sync fat jar
        run: mvn -B -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}
            org.opencontainers.image.title=SIGDEP-3 edge sync agent
            org.opencontainers.image.licenses=Proprietary

      - name: Summary
        run: |
          echo "### Image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
