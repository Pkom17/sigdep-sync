spring:
  application:
    name: sigdep-sync

sigdep:
  sync:
    site-code: ${SIGDEP_SITE_CODE:UNKNOWN}
    central-api-url: ${SIGDEP_CENTRAL_API_URL:http://localhost:8080}
    batch-size: ${SIGDEP_BATCH_SIZE:500}
    sync-interval-minutes: ${SIGDEP_SYNC_INTERVAL_MINUTES:15}
    interval-ms: 900000
    watermark-initial: 1970-01-01T00:00:00
    max-reject-attempts: ${SIGDEP_MAX_REJECT_ATTEMPTS:10}
    # OkHttp timeouts to the hub. Raise read/write for sites with a big
    # backfill on a slow link (LAB_RESULTS in particular can take time
    # to serialise + persist). Defaults match the historical hard-coded
    # values to keep existing deployments unchanged.
    http:
      connect-timeout-seconds: ${SIGDEP_HTTP_CONNECT_TIMEOUT_SECONDS:10}
      read-timeout-seconds: ${SIGDEP_HTTP_READ_TIMEOUT_SECONDS:60}
      write-timeout-seconds: ${SIGDEP_HTTP_WRITE_TIMEOUT_SECONDS:60}
    # Clé API du site (auth v2.0). Générée dans la console hub
    # (Sites → « Gérer » → Générer une clé), copiée ici une seule fois.
    api-key: ${SIGDEP_API_KEY:}
    identifier-mapping:
      # OpenMRS patient_identifier_type.name  ->  core.identifier_types.code
      # Adjust for site-specific naming. Unmapped types are silently dropped.
      "[1.Nouvelle Nomenclature de PEC VIH]": CODE_ARV
      "[2.Ancienne Nomenclature de PEC VIH]": CODE_ARV_OLD
      "[UPI]": UPID
      "[CRUID]": CRUID
    local-db:
      jdbc-url: ${SIGDEP_LOCAL_DB_URL:jdbc:mysql://localhost:3306/openmrs?readOnly=true&useSSL=false}
      username: ${SIGDEP_LOCAL_DB_USER:sigdep_reader}
      password: ${SIGDEP_LOCAL_DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
    buffer-db:
      jdbc-url: jdbc:sqlite:${SIGDEP_BUFFER_PATH:/var/lib/sigdep-agent/buffer.sqlite}
      driver-class-name: org.sqlite.JDBC
    backfill:
      enabled: false
      max-requests-per-minute: 30
      cron: "0 0 22 * * MON-FRI"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    ci.itechciv.sigdep.sync: DEBUG
